<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#04050b" />
  <title>Dash Runner — OGH</title>
  <link rel="stylesheet" href="../../_shared/css/ogh-fonts.css" />
  <link rel="stylesheet" href="../../_shared/css/ogh-base.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dr-body ogh-font-ui">
  <div class="ogh-root" id="root">
    <header class="dr-top">
      <a class="back" href="/games/">← <span data-i18n="back">Library</span></a>
      <div class="dr-hud" role="status">
        <div class="ogh-pill" id="hudDistance" data-i18n-aria="distanceAria"><span aria-hidden="true">▸</span> <strong id="distanceVal">0</strong>m</div>
        <div class="ogh-pill" id="hudCoins" data-i18n-aria="coinsAria"><span aria-hidden="true">◆</span> <strong id="coinsVal">0</strong></div>
        <div class="ogh-pill" id="hudBest" data-i18n-aria="bestAria"><span aria-hidden="true">★</span> <strong id="bestVal">0</strong></div>
      </div>
      <div class="lang-switch" id="langSwitch" role="group" aria-label="Language"></div>
    </header>

    <!-- dir="ltr" is deliberate and must stay: this is a spatial gameplay
         viewport (3 fixed lanes, swipe left/right to change lanes), not
         prose — it must never mirror under an RTL UI language (e.g.
         Arabic). Same risk category / precedent as games/cross-the-road's
         #ctr-stage and games/pop-the-bugs' #grid. render.js also never
         reads document direction, and game.js's canvas 2D context forces
         ctx.direction='ltr' as a second belt-and-suspenders guard. -->
    <main class="ogh-stage dr-stage" dir="ltr">
      <canvas class="dr-canvas" id="game" width="720" height="1000" dir="ltr" aria-label="Trail"></canvas>
    </main>

    <p class="dr-hint" id="hint" data-i18n="hint">Swipe left/right to switch lanes · up to jump · down to duck</p>

    <!-- Touch controls — deliberately forced LTR regardless of document dir
         (see style.css .dr-controls): the left button always switches to
         the physically-left lane, matching the un-mirrored track above. -->
    <div class="dr-controls" id="controls">
      <button type="button" class="dr-btn dr-btn-left" id="btnLeft" data-i18n-aria="btnLeftAria" aria-label="Switch to left lane">◀</button>
      <button type="button" class="dr-btn dr-btn-jump" id="btnJump" data-i18n-aria="btnJumpAria" aria-label="Jump">▲</button>
      <button type="button" class="dr-btn dr-btn-duck" id="btnDuck" data-i18n-aria="btnDuckAria" aria-label="Duck">▼</button>
      <button type="button" class="dr-btn dr-btn-right" id="btnRight" data-i18n-aria="btnRightAria" aria-label="Switch to right lane">▶</button>
    </div>

    <div class="ogh-overlay" id="overlay">
      <div class="ogh-card dr-card" id="startCard">
        <h1 data-i18n="title">Dash Runner</h1>
        <p data-i18n="blurb">Ember the glow-fox is off down the night trail — swipe to switch lanes, jump logs, duck vines, and dodge pillars. Speed never stops climbing. How far can you dash?</p>
        <p class="dr-best-line" id="bestLineStart"></p>
        <button type="button" class="ogh-btn ogh-btn-primary" id="btnStart" data-i18n="startBtn">Start</button>
      </div>

      <div class="ogh-card dr-card" id="overCard" hidden>
        <h1 data-i18n="gameOverTitle">Caught!</h1>
        <p class="dr-final-line" id="finalStatsLine"></p>
        <p class="dr-new-best" id="newBestLine" hidden data-i18n="newBest">New best distance!</p>
        <p class="dr-best-line" id="bestLineEnd"></p>
        <button type="button" class="ogh-btn ogh-btn-primary" id="btnAgain" data-i18n="playAgainBtn">Run again</button>
      </div>
    </div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
