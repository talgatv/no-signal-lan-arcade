<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#07080f" />
  <title>Music Synth — OGH</title>
  <link rel="stylesheet" href="../../_shared/css/ogh-fonts.css" />
  <link rel="stylesheet" href="../../_shared/css/ogh-base.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="ms-body ogh-font-ui">
  <div class="ogh-root" id="root">
    <header class="ms-top">
      <a class="back" href="/games/">← <span data-i18n="back">Library</span></a>
      <div class="titles">
        <h1 data-i18n="title">Music Synth</h1>
        <p class="sub" data-i18n="tagline">A procedural synth keyboard — no samples, just oscillators.</p>
      </div>
      <div class="lang-switch" id="langSwitch" role="group" aria-label="Language"></div>
    </header>

    <div class="ms-instruments" id="instrumentsWrap" role="tablist" aria-label="Instrument"></div>

    <div class="ms-controls">
      <div class="ms-oct-group" role="group" aria-label="Octave">
        <button type="button" class="ms-ctrl-btn" id="octDown" data-i18n-title="octDownAria" aria-label="Octave down">−</button>
        <span class="ms-oct-readout" id="octReadout">C4</span>
        <button type="button" class="ms-ctrl-btn" id="octUp" data-i18n-title="octUpAria" aria-label="Octave up">+</button>
      </div>
      <label class="ms-slider">
        <span data-i18n="volumeLabel">Volume</span>
        <input type="range" id="volumeRange" min="0" max="1" step="0.01" value="0.8" />
      </label>
      <label class="ms-slider">
        <span data-i18n="reverbLabel">Reverb</span>
        <input type="range" id="reverbRange" min="0" max="1" step="0.01" value="0.3" />
      </label>
    </div>

    <main class="ogh-stage ms-stage">
      <!-- dir="ltr" is deliberate and must stay: a piano's pitch order (low
           notes left, high notes right) is a fixed musical/spatial convention,
           not something that should mirror with the page's text direction
           when the UI language is RTL (e.g. Arabic). See style.css .pk-piano
           for the matching `direction: ltr` (belt-and-suspenders for the
           flex ordering + absolute-positioned black keys). -->
      <div class="pk-piano" id="piano" dir="ltr">
        <div class="pk-whites" id="pkWhites"></div>
        <div class="pk-blacks" id="pkBlacks"></div>
      </div>
    </main>

    <p class="ms-hint" id="hint" data-i18n="hint">Play with touch or mouse, or A S D F G H J K · W E T Y U · Z/X shifts octave</p>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
