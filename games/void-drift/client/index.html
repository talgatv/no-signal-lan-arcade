<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#07080f" />
  <title>Void Drift — OGH</title>
  <link rel="stylesheet" href="../../_shared/css/ogh-fonts.css" />
  <link rel="stylesheet" href="../../_shared/css/ogh-base.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="vd-body ogh-font-ui">
  <div class="ogh-root" id="root">
    <header class="vd-top">
      <a class="back" href="/games/">← <span data-i18n="back">Library</span></a>
      <div class="vd-hud" role="status">
        <div class="ogh-pill vd-score" id="hudScore" data-i18n-aria="hudScoreAria">
          <span class="vd-lbl" data-i18n="scoreLabel">SCORE</span>
          <strong id="hudScoreVal">0</strong>
        </div>
        <div class="ogh-pill vd-lives" id="hudLives" data-i18n-aria="hudLivesAria">
          <span class="vd-lbl" data-i18n="livesLabel">SHIPS</span>
          <span class="vd-ships" id="hudLivesVal"></span>
        </div>
        <div class="ogh-pill vd-wave" id="hudWave" data-i18n-aria="hudWaveAria">
          <span class="vd-lbl" data-i18n="waveLabel">WAVE</span>
          <strong id="hudWaveVal">1</strong>
        </div>
      </div>
      <div class="lang-switch" id="langSwitch" role="group" data-i18n-aria="langSwitchAria"></div>
    </header>

    <!-- The play field is a physics simulation with screen-wrap, not reading-order
         text: dir="ltr" here (plus ctx.direction forced 'ltr' in game.js) keeps the
         canvas, wraparound and touch-button layout from ever mirroring under RTL.
         Only the header/cards/hint text chrome flips for Arabic — see i18n.js. -->
    <main class="vd-stage" dir="ltr">
      <canvas id="view" class="vd-view" aria-label="Void Drift play field"></canvas>

      <div class="vd-wave-banner" id="waveBanner" aria-hidden="true"></div>

      <div class="vd-touch" id="touchLayer" dir="ltr">
        <div class="vd-dpad">
          <button type="button" class="vd-btn vd-btn-thrust" id="btnThrust" data-i18n-aria="btnThrustAria" aria-label="Thrust"><span aria-hidden="true">▲</span></button>
          <div class="vd-dpad-row">
            <button type="button" class="vd-btn vd-btn-rotate" id="btnLeft" data-i18n-aria="btnRotateLeftAria" aria-label="Rotate left"><span aria-hidden="true">◁</span></button>
            <button type="button" class="vd-btn vd-btn-rotate" id="btnRight" data-i18n-aria="btnRotateRightAria" aria-label="Rotate right"><span aria-hidden="true">▷</span></button>
          </div>
        </div>
        <button type="button" class="vd-btn vd-btn-fire" id="btnFire" data-i18n-aria="btnFireAria" aria-label="Fire"><span aria-hidden="true">●</span></button>
      </div>
    </main>

    <p class="ogh-hint" id="hint" data-i18n="hint">Rotate ◁ ▷ · Thrust ▲ · Fire ● — momentum carries, so drift with it</p>

    <div class="ogh-overlay" id="overlay">
      <div class="ogh-card vd-card" id="startCard">
        <h1 data-i18n="title">Void Drift</h1>
        <p data-i18n="blurb">Newtonian dogfighting in the vacuum.</p>
        <div class="vd-legend" role="list">
          <div class="vd-legend-item" role="listitem"><span class="vd-sw vd-sw-large"></span><span id="legendLargeTxt">Large rock</span></div>
          <div class="vd-legend-item" role="listitem"><span class="vd-sw vd-sw-medium"></span><span id="legendMediumTxt">Medium rock</span></div>
          <div class="vd-legend-item" role="listitem"><span class="vd-sw vd-sw-small"></span><span id="legendSmallTxt">Small rock</span></div>
          <div class="vd-legend-item" role="listitem"><span class="vd-sw vd-sw-ufo"></span><span id="legendUfoTxt">UFO</span></div>
        </div>
        <p class="vd-controls-note" data-i18n="controlsNote">Touch and keyboard controls.</p>
        <p class="vd-best-line" id="bestLineStart"></p>
        <button type="button" class="ogh-btn ogh-btn-primary" id="btnStart" data-i18n="startBtn">Launch</button>
      </div>

      <div class="ogh-card vd-card" id="gameOverCard" hidden>
        <h1 data-i18n="gameOverTitle">Ship Lost</h1>
        <p id="gameOverSub"></p>
        <p class="vd-stats" id="finalScoreLine"></p>
        <p class="vd-stats vd-new-best" id="newBestLine" hidden data-i18n="newBestLine">New best score!</p>
        <p class="vd-best-line" id="bestLineEnd"></p>
        <button type="button" class="ogh-btn ogh-btn-primary" id="btnAgain" data-i18n="playAgainBtn">Fly again</button>
      </div>
    </div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
