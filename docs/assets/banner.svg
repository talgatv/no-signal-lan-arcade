<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07080f"/>
      <stop offset="50%" stop-color="#12162a"/>
      <stop offset="100%" stop-color="#1a1028"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5ce1ff"/>
      <stop offset="100%" stop-color="#ff6bcb"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="280" fill="url(#bg)"/>
  <!-- soft orbs -->
  <circle cx="120" cy="80" r="90" fill="#5ce1ff" opacity="0.06"/>
  <circle cx="820" cy="200" r="110" fill="#ff6bcb" opacity="0.07"/>
  <!-- orbit ring -->
  <ellipse cx="480" cy="145" rx="210" ry="70" fill="none" stroke="url(#neon)" stroke-width="2" opacity="0.55" filter="url(#glow)"/>
  <ellipse cx="480" cy="145" rx="150" ry="48" fill="none" stroke="#5ce1ff" stroke-width="1" opacity="0.25" stroke-dasharray="6 8"/>
  <!-- nodes -->
  <circle cx="270" cy="145" r="6" fill="#5ce1ff" filter="url(#glow)"/>
  <circle cx="480" cy="75" r="5" fill="#ff6bcb" filter="url(#glow)"/>
  <circle cx="690" cy="145" r="6" fill="#5cffb0" filter="url(#glow)"/>
  <circle cx="480" cy="215" r="5" fill="#ffd166" filter="url(#glow)"/>
  <!-- title -->
  <text x="480" y="150" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="url(#neon)">OFFLINE GAMES HUB</text>
  <text x="480" y="185" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#8b93b8" letter-spacing="3">LAN ARCADE · NO CLOUD · NO INSTALL FOR PLAYERS</text>
</svg>
