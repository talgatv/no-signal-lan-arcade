<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07080f" />
  <title>Video Convert — OGH</title>
  <link rel="stylesheet" href="/games/_shared/css/ogh-fonts.css" />
  <link rel="stylesheet" href="/games/_shared/css/ogh-base.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="vc-body ogh-font-ui">
  <header class="vc-top">
    <a class="back" href="/games/">← <span data-i18n="back">Library</span></a>
    <div class="titles">
      <h1 data-i18n="title">Video Convert</h1>
      <p class="sub" data-i18n="tagline">Private · in-browser · no uploads</p>
    </div>
    <div class="lang-switch" id="langSwitch" role="group" aria-label="Language"></div>
  </header>

  <!-- Pick / drop -->
  <section id="dropZone" class="drop">
    <button type="button" class="ogh-btn ogh-btn-primary pick" id="pickBtn" data-i18n="pickBtn">Choose a video</button>
    <p class="drop-hint" data-i18n="dropHint">or drag &amp; drop here</p>
    <p class="drop-sub" data-i18n="dropSub">mp4 · webm · mov · mkv · m4v · ogv — processed locally, never uploaded</p>
    <input id="fileInput" type="file" accept="video/*" hidden />
  </section>

  <!-- Editor -->
  <main id="editor" class="editor" hidden>
    <div class="row preview-row">
      <div class="preview">
        <video id="srcVideo" playsinline controls preload="metadata"></video>
        <div id="meta" class="meta" hidden>
          <span><b data-i18n="metaSizeLabel">Size</b> <span id="metaSize">…</span></span>
          <span><b data-i18n="metaFrameLabel">Frame</b> <span id="metaDim">…</span></span>
          <span><b data-i18n="metaTimeLabel">Time</b> <span id="metaDur">…</span></span>
          <span><b data-i18n="metaTypeLabel">Type</b> <span id="metaType">…</span></span>
        </div>
        <p class="file-name" id="fileName"></p>
      </div>
    </div>

    <!-- Trim controls -->
    <section id="trimSection" class="trim card" hidden>
      <h2 data-i18n="trimHeading">Trim (optional)</h2>
      <div class="trim-grid">
        <label class="trim-field"><span data-i18n="trimStartLabel">Start (s)</span>
          <input id="trimStart" type="number" min="0" step="0.1" />
        </label>
        <label class="trim-field"><span data-i18n="trimEndLabel">End (s)</span>
          <input id="trimEnd" type="number" min="0" step="0.1" />
        </label>
      </div>
      <p class="trim-out" id="trimReadout">—</p>
      <div class="trim-actions">
        <button type="button" class="mini" id="setStartBtn" data-i18n="setStartBtn">Set start to playhead</button>
        <button type="button" class="mini" id="setEndBtn" data-i18n="setEndBtn">Set end to playhead</button>
      </div>
    </section>

    <!-- Operation + fields -->
    <section class="op card">
      <h2 data-i18n="operationHeading">Operation</h2>
      <label class="op-select">
        <span class="field-label" data-i18n="toolLabel">Tool</span>
        <select id="opSelect" class="ctrl"></select>
      </label>
      <div id="fields" class="fields"></div>
    </section>

    <div class="actions">
      <button type="button" class="ogh-btn ogh-btn-primary run" id="runBtn" data-i18n="runBtn" disabled>Run</button>
      <button type="button" class="ogh-btn ghost" id="resetBtn" data-i18n="resetBtn">New video</button>
    </div>

    <!-- Progress -->
    <div id="progress" class="progress" hidden>
      <div class="bar"><div id="progressBar" class="bar-fill"></div></div>
      <p id="progressLabel" class="progress-label">…</p>
    </div>

    <!-- Result -->
    <section id="result" class="result card" hidden>
      <h2 data-i18n="resultHeading">Result</h2>
      <div id="resultArea"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
